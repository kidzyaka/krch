spring.application.name=krch
server.port=${SERVER_PORT:443}
server.ssl.key-store=${KEYSTORE_PATH:file:keystore.p12}
server.ssl.key-store-password=${KEYSTORE_PASSWORD:krchpassword}
server.ssl.key-store-type=${KEYSTORE_TYPE:PKCS12}
server.ssl.key-alias=${KEYSTORE_ALIAS:krch}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
spring.datasource.username=${DB_USERNAME:krchuser}
spring.datasource.password=${DB_PASSWORD:krchpassword}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
